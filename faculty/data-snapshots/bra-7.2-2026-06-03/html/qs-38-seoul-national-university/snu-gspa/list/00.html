


<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            padding: 10% 20px;
            margin: 0;
        }

        .error-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 80px;
            color: #0d6efd;
            margin: 0;
            line-height: 1;
        }

        h2 {
            font-size: 24px;
            margin-top: 20px;
            color: #495057;
        }

        p {
            font-size: 16px;
            color: #6c757d;
            line-height: 1.6;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 24px;
            background-color: #0d6efd;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

            .btn-home:hover {
                background-color: #0b5ed7;
            }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>요청하신 페이지를 찾을 수 없습니다.</h2>
        <p>
            입력하신 주소가 잘못되었거나,<br />
            페이지가 변경 혹은 삭제되어 현재 접근할 수 없습니다.<br />
            주소를 다시 한번 확인해 주시기 바랍니다.
        </p>
        <a href="/" class="btn-home">홈으로 돌아가기</a>
    </div>
</body>
</html>
